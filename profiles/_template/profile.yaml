# Project Profile Template
# Kopiuj do profiles/<projekt>/profile.yaml przed edycją
# Pole `project` musi być unikalne w całym vault

project: "<project-name>"
client: "<client-name>"          # np. mako, internal
aws:
  account_id: "<123456789012>"
  region: "<eu-west-1>"
  profile: "<aws-cli-profile>"
  safety_mode: read_only          # read_only | conditional_go | unrestricted

repo:
  local: "~/projekty/<client>/<project>/"
  remote: "<https://github.com/org/repo>"
  main_branch: main
  active_branch: "<branch-name>"

vault:
  notes_dir: "20-projects/clients/<client>/<project>/"
  session_log: "20-projects/clients/<client>/<project>/session-log.md"

open_items:
  # Format: ID — opis — stan
  # Stan: open | conditional_go | pending_push | done
  - "D1 — opis driftu — open"
  - "P1 — opis zadania — conditional_go"

safety:
  # Akcje wymagające osobnego GO przed wykonaniem
  requires_go:
    - "terraform apply"
    - "aws ecs update-service"
    - "git push --force"
